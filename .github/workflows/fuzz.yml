name: Fuzz Testing

on:
  # Run weekly on Sundays at midnight UTC
  schedule:
    - cron: '0 0 * * 0'
  # Allow manual trigger
  workflow_dispatch:
  # Run on PRs that modify fuzz tests
  pull_request:
    paths:
      - 'test/fuzz/**'
      - '.github/workflows/fuzz.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: libFuzzer
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake libnetcdf-dev libhdf5-dev

    - name: Display compiler version
      run: |
        clang --version
        clang++ --version

    - name: Configure CMake with fuzz tests
      run: |
        cmake -B build \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_FUZZ_TESTS=ON

    - name: Build fuzz targets
      run: cmake --build build --target fuzz_sensor fuzz_header fuzz_knownbytes fuzz_data fuzz_decompress

    - name: Seed corpus from checked-in examples
      # test/fuzz/corpus/<target>/ holds the canonical seeds. The fuzzer reads
      # and writes to build/fuzz_corpus/<target>/ at runtime, so copy fresh.
      run: |
        for target in sensor header knownbytes data decompress; do
          mkdir -p "build/fuzz_corpus/$target"
          if [ -d "test/fuzz/corpus/$target" ]; then
            cp -a "test/fuzz/corpus/$target/." "build/fuzz_corpus/$target/"
          fi
        done

    - name: Run fuzz_sensor (60 seconds)
      run: |
        cd build
        timeout 60 ./bin/fuzz_sensor fuzz_corpus/sensor -max_total_time=55 || true

    - name: Run fuzz_header (60 seconds)
      run: |
        cd build
        timeout 60 ./bin/fuzz_header fuzz_corpus/header -max_total_time=55 || true

    - name: Run fuzz_knownbytes (60 seconds)
      run: |
        cd build
        timeout 60 ./bin/fuzz_knownbytes fuzz_corpus/knownbytes -max_total_time=55 || true

    - name: Run fuzz_data (60 seconds)
      run: |
        cd build
        timeout 60 ./bin/fuzz_data fuzz_corpus/data -max_total_time=55 || true

    - name: Run fuzz_decompress (60 seconds)
      run: |
        cd build
        timeout 60 ./bin/fuzz_decompress fuzz_corpus/decompress -max_total_time=55 || true

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: fuzz-crashes
        path: |
          build/crash-*
          build/leak-*
          build/timeout-*
        retention-days: 30
